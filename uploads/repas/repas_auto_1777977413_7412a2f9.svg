<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fond dégradé -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Cercles décoratifs (assiette) -->
  <circle cx="400" cy="230" r="140" fill="rgba(255,255,255,0.15)"/>
  <circle cx="400" cy="230" r="100" fill="rgba(255,255,255,0.2)"/>
  <circle cx="400" cy="230" r="60"  fill="rgba(255,255,255,0.25)"/>
  <!-- Icône fourchette/couteau simplifiée -->
  <line x1="370" y1="190" x2="370" y2="270" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="190" x2="400" y2="270" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="430" y1="190" x2="430" y2="270" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bande sombre en bas -->
  <rect x="0" y="390" width="800" height="110" fill="rgba(0,0,0,0.4)"/>
  <!-- Nom du repas -->
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">salade</text>
  <!-- Sous-titre -->
  <text x="400" y="475" font-family="Arial, sans-serif" font-size="14"
        fill="rgba(255,255,255,0.8)" text-anchor="middle">SmartMeal Planner</text>
</svg>